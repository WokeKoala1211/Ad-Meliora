<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AD MELIORA — SUMMER DROP</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- SECTION 1: SUMMER DROP HERO -->
    <section class="landing section">
        <h1>SUMMER DROP</h1>
        <h2 id="countdown"></h2>

        <p class="tagline">Get notified when new drops go live.</p>

        <form id="notifyForm">
            <input id="phoneInput" type="text" placeholder="Phone Number">
            <button type="submit">Notify Me</button>
        </form>

        <div id="confirmationMessage">You're subscribed!</div>
    </section>

    <!-- SECTION 2: ABOUT THE DROP -->
    <section class="info section">
        <h3>About This Drop</h3>
        <p>
            The AD MELIORA Summer Drop features limited pieces inspired by heat,
            motion, and elevation. Designed for those who move with intention.
        </p>
    </section>

    <!-- SECTION 3: FOOTER -->
    <footer class="section">
        © 2026 AD MELIORA — ALL RIGHTS RESERVED
    </footer>

    <script src="script.js"></script>
</body>
</html>
