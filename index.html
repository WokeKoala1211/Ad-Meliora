<body>

    <!-- Landing Section -->
    <div class="landing section">
        <h1>NEXT DROP</h1>
        <button class="scroll-btn" onclick="scrollToNext()">Explore</button>
    </div>

    <!-- Hero Section -->

        <div class="notify-container">

            </form>

            <div id="confirmationMessage">You're subscribed!</div>
        </div>
    </div>
