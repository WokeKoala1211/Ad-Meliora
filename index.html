<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AD MELIORA</title>

    <!-- Modern Brand Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Landing Section -->
<div class="landing">
    <div class="gradient"></div>

    <div class="content fade-in">
        <h1 class="headline">AD MELIORA</h1>
        <p class="subtext">SUMMER DROP</p>
        <button class="cta" onclick="scrollToNext()">ENTER</button>
    </div>
</div>

<!-- Hero Section -->
<section class="hero section">
    <div class="drop-timer">
        <h2 class="drop-title">NEXT DROP</h2>
        <p id="countdown" class="drop-countdown">Loading...</p>
    </div>

    <div class="signup">
        <h3 class="signup-title">Get Drop Notifications</h3>
        <p class="signup-subtext">Enter your phone number to get notified when new drops go live.</p>

        <form id="notifyForm">
            <input type="tel" id="phoneInput" placeholder="Phone Number" required>
            <button type="submit">Notify Me</button>
        </form>

        <p id="confirmationMessage" class="hidden">
            Thanks — you’ll get a text when the next drop is live.
        </p>
    </div>
</section>

<!-- Footer -->
<footer class="footer">
    © 2024 AD MELIORA — ALL RIGHTS RESERVED
</footer>

<script src="script.js"></script>
</body>
</html>
