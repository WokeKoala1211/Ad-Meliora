<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AD MELIORA</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="hero">
        <div class="overlay"></div>

        <div class="hero-content">
            <h1 class="brand-title">AD MELIORA</h1>
            <h2 class="brand-subtitle">Summer Drop</h2>

            <button id="enterBtn" class="enter-btn">Enter</button>

            <p class="hero-quote">
                YOU CAN’T STAY THE SAME AND EXPECT THE INCOME TO CHANGE.
            </p>
        </div>
    </div>

    <!-- POPUP MODAL -->
    <div id="popup" class="popup hidden">
    <div class="popup-box">
        <h3>Get Drop Notifications</h3>
        <p>Choose how you want to be notified.</p>

        <form id="popupForm">

            <select id="contactType">
                <option value="phone">Phone Number</option>
                <option value="email">Email Address</option>
            </select>

            <input id="popupInput" type="text" placeholder="Enter phone or email" required>

            <button type="submit">Notify Me</button>
        </form>

        <div id="checkmark" class="checkmark hidden">✓</div>

        <p id="popupConfirm" class="hidden">You're all set — see you at the drop.</p>
    </div>
</div>

<script src="popup.js"></script>


    <script src="popup.js"></script>
</body>
</html>
