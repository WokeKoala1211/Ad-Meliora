<section class="hero">
    <h1 class="brand-name">AD MELIORA</h1>

    <div class="drop-timer">
        <h2>Enter Next Drop</h2>
        <p id="countdown">10D 6H 53M</p>
    </div>

    <div class="signup">
        <h3>Get Drop Notifications</h3>
        <p>Enter your phone number to get notified when new drops go live.</p>

        <form id="notifyForm">
            <input type="tel" id="phoneInput" placeholder="Phone Number" required>
            <button type="submit">Notify Me</button>
        </form>

        <p id="confirmationMessage" class="hidden">
            Thanks — you’ll get a text when the next drop is live.
        </p>
    </div>
</section>
