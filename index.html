<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AD MELIORA</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="landing">
    <div class="gradient"></div>

    <div class="content fade-in">
        <h1 class="headline">AD MELIORA</h1>
        <p class="subtext">Summer Drop!</p>
        <button class="cta" onclick="scrollToNext()">Enter</button>
    </div>
</div>

<section class="hero">
    <div class="drop-timer">
        <h2 class="drop-title">NEXT DROP</h2>
        <p id="countdown" class="drop-countdown">10D • 6H • 53M</p>
    </div>

    <div class="signup">
        <h3 class="signup-title">Get Drop Notifications</h3>
        <p class="signup-subtext">Enter your phone number to get notified when new drops go live.</p>

        <form id="notifyForm">
            <input type="tel" id="phoneInput" placeholder="Phone Number" required>
            <button type="submit">Notify Me</button>
        </form>

        <p id="confirmationMessage" class="hidden">
            Thanks — you’ll get a text when the next drop is live.
        </p>
    </div>
</section>


<script src="script.js"></script>

</body>
</html>
